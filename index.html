<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>We Are Ghosts 8th Wall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script
    src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
    async
    crossorigin="anonymous"
    data-preload-chunks="slam">
  </script>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

<a-scene xrweb xrextras-runtime-error xrextras-loading renderer="colorManagement: true;">

  <a-assets>

    <!-- WATER -->

    <img id="waterOne" src="assets/images/water-1.jpg">
    <img id="waterTwo" src="assets/images/water-2.jpg">

    <!-- GLB MODEL -->

    <a-asset-item
      id="flowerModel"
      src="assets/models/flower.glb">
    </a-asset-item>

  </a-assets>

  <a-camera position="0 1.6 0"></a-camera>

  <!-- TEST CUBE -->

  <a-box
    position="0 0 -3"
    scale="0.6 0.6 0.6"
    material="color: red;">
  </a-box>

<!-- FLOWER MODEL -->
<a-entity
  gltf-model="#flowerModel"
  position="2 -1 -4"
  scale="30 30 30">
</a-entity>

  <!-- LOWER WATER LAYER -->

  <a-plane position="-154 -35.2 74" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="-77 -35.2 74" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="0 -35.2 74" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="77 -35.2 74" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="154 -35.6 74" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>

  <a-plane position="-154 -35.2 -3" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="-77 -35.2 -3" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="0 -35.2 -3" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="77 -35.2 -3" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="154 -35.2 -3" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>

  <a-plane position="-154 -35.2 -80" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="-77 -35.2 -80" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="0 -35.2 -80" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="77 -35.2 -80" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="154 -35.2 -80" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>

  <a-plane position="-154 -35.2 -157" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="-77 -35.2 -157" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="0 -35.2 -157" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="77 -35.2 -157" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="154 -35.2 -157" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>

  <!-- TOP WATER OVERLAY -->

  <a-plane position="-154 -35 74" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.45;"></a-plane>
  <a-plane position="-77 -35 74" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.45;"></a-plane>
  <a-plane position="0 -35 74" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.45;"></a-plane>
  <a-plane position="77 -35 74" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.45;"></a-plane>
  <a-plane position="154 -35 74" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.45;"></a-plane>

</a-scene>

</body>
</html>
