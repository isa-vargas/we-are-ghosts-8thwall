<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>We Are Ghosts 8th Wall</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script
    src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
    async
    crossorigin="anonymous"
    data-preload-chunks="slam">
  </script>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<script>
  AFRAME.registerComponent("slow-scroll-water", {
    tick: function (time) {
      const mesh = this.el.getObject3D("mesh");

      if (mesh && mesh.material && mesh.material.map) {
        mesh.material.map.offset.x = time * 0.00015;
      }
    }
  });
</script>
</head>

<body style="margin: 0; overflow: hidden;">

  <a-scene
    xrweb
    xrextras-runtime-error
    xrextras-loading
    renderer="colorManagement: true;"
  >

    <a-assets>
      <img id="waterOne" src="assets/images/water-1.jpg">
    </a-assets>

    <a-camera position="0 1.6 0"></a-camera>

    <!-- TEST CUBE -->
    <a-box
      position="0 0 -3"
      scale="0.6 0.6 0.6"
      material="color: red;">
    </a-box>

    <!-- OCEAN GRID WITH SOFT OPACITY + SLOW SCROLL -->

    <a-plane slow-scroll-water position="0 -35 -3" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.65;"></a-plane>
    <a-plane slow-scroll-water position="0 -35 -80" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.65;"></a-plane>
    <a-plane slow-scroll-water position="0 -35 74" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.65;"></a-plane>

    <a-plane slow-scroll-water position="-77 -35 -3" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.65;"></a-plane>
    <a-plane slow-scroll-water position="77 -35 -3" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.65;"></a-plane>

    <a-plane slow-scroll-water position="-77 -35 -80" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.65;"></a-plane>
    <a-plane slow-scroll-water position="77 -35 -80" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.65;"></a-plane>

    <a-plane slow-scroll-water position="-77 -35 74" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.65;"></a-plane>
    <a-plane slow-scroll-water position="77 -35 74" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.65;"></a-plane>

    <!-- EXTRA FRONT ROW 1 -->

    <a-plane slow-scroll-water position="0 -35 -157" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.65;"></a-plane>

</body>

</html>
