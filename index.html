<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>We Are Ghosts 8th Wall</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <!-- 8th Wall -->
  <script
    src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
    async
    crossorigin="anonymous"
    data-preload-chunks="slam">
  </script>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<script>
  AFRAME.registerComponent("scroll-ocean", {
    tick: function (time) {

      const mesh = this.el.getObject3D("mesh");

      if (mesh && mesh.material && mesh.material.map) {

        mesh.material.map.offset.x = time * 0.00025;

      }

    }
  });
</script>

</head>

<body style="margin: 0; overflow: hidden;">

  <a-scene
    xrweb
    xrextras-runtime-error
    xrextras-loading
    renderer="colorManagement: true;"
  >

    <!-- ASSETS -->

    <a-assets>

      <img
        id="waterFive"
        src="assets/images/water-5.jpeg"
      >

    </a-assets>

    <!-- CAMERA -->

    <a-camera position="0 1.6 0"></a-camera>

    <!-- TEST CUBE -->

    <a-box
      position="0 0 -3"
      scale="0.6 0.6 0.6"
      material="color: red;">
    </a-box>

    <!-- LARGE SINGLE OCEAN -->

    <a-plane
      scroll-ocean
      position="0 -42 -160"
      rotation="-90 0 0"
      width="420"
      height="520"
      material="
        src: url(assets/images/water-5.jpeg);
        shader: flat;
        side: double;
      ">
    </a-plane>

  </a-scene>

</body>

</html>
