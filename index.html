<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>We Are Ghosts 8th Wall</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 8th Wall -->
  <script
    src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
    async
    crossorigin="anonymous"
    data-preload-chunks="slam">
  </script>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

</head>

<body style="margin: 0; overflow: hidden;">

  <!-- START BUTTON -->

  <button
    id="startButton"
    style="
      position: fixed;
      z-index: 9999;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 22px;
      font-size: 16px;
    ">
    Start Experience
  </button>

  <a-scene
    xrweb
    xrextras-runtime-error
    xrextras-loading
    renderer="colorManagement: true;"
  >

    <!-- ASSETS -->

    <a-assets>

      <video
        id="waterVideo"
        src="assets/assets/videos/water-loop.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous">
      </video>

    </a-assets>

    <!-- CAMERA -->

    <a-camera position="0 1.6 0"></a-camera>

    <!-- TEST CUBE -->

    <a-box
      position="0 0 -3"
      scale="0.6 0.6 0.6"
      material="color: red;">
    </a-box>

    <!-- WATER VIDEO FLOOR -->

    <a-plane
      position="0 -35 -120"
      rotation="-90 0 0"
      width="220"
      height="420"
      material="
        src: #waterVideo;
        shader: flat;
        side: double;
        transparent: true;
        opacity: 0.9;
      ">
    </a-plane>

  </a-scene>

  <script>

    const button = document.querySelector("#startButton");
    const waterVideo = document.querySelector("#waterVideo");

    button.addEventListener("click", async function () {

      try {

        waterVideo.muted = true;
        waterVideo.playsInline = true;
        waterVideo.currentTime = 0;

        await waterVideo.play();

        button.style.display = "none";

        console.log("Water video playing");

      } catch (error) {

        console.log("Playback failed:", error);

        button.innerText = "Tap Again";

      }

    });

  </script>

</body>

</html>

</html>
