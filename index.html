<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>We Are Ghosts 8th Wall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script
    src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
    async
    crossorigin="anonymous"
    data-preload-chunks="slam">
  </script>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

<a-scene
  xrweb
  xrextras-runtime-error
  xrextras-loading
  renderer="colorManagement: true;"
>

  <a-assets>

    <!-- WATER -->

    <img id="waterOne" src="assets/images/water-1.jpg">
    <img id="waterTwo" src="assets/images/water-2.jpg">

    <!-- GLB MODEL -->

    <a-asset-item
      id="flowerModel"
      src="assets/models/flower.glb">
    </a-asset-item>

  </a-assets>

  <!-- CAMERA -->

  <a-camera position="0 1.6 0"></a-camera>

  <!-- TEST CUBE -->

  <a-box
    position="0 0 -3"
    scale="0.6 0.6 0.6"
    material="color: red;">
  </a-box>

  <!-- FLOWER MODEL -->

  <a-entity
    gltf-model="#flowerModel"
    position="0 -1 -4"
    scale="8 8 8"
    rotation="0 0 0">
  </a-entity>

  <!-- LOWER WATER LAYER -->

  <!-- ROW 1 -->
  <a-plane position="-148 -35.6 70" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="-74 -35.6 70" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="0 -35.6 70" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="74 -35.6 70" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="148 -35.6 70" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>

  <!-- ROW 2 -->
  <a-plane position="-148 -35.6 -4" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="-74 -35.6 -4" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="0 -35.6 -4" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="74 -35.6 -4" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="148 -35.6 -4" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>

  <!-- ROW 3 -->
  <a-plane position="-148 -35.6 -78" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="-74 -35.6 -78" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="0 -35.6 -78" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="74 -35.6 -78" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="148 -35.6 -78" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>

  <!-- ROW 4 -->
  <a-plane position="-148 -35.6 -152" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="-74 -35.6 -152" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="0 -35.6 -152" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="74 -35.6 -152" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="148 -35.6 -152" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>

  <!-- ROW 5 -->
  <a-plane position="-148 -35.6 -226" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="-74 -35.6 -226" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="0 -35.6 -226" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="74 -35.6 -226" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="148 -35.6 -226" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>

  <!-- ROW 6 -->
  <a-plane position="-148 -35.6 -300" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="-74 -35.6 -300" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="0 -35.6 -300" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="74 -35.6 -300" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>
  <a-plane position="148 -35.6 -300" rotation="-90 0 0" width="77" height="77" material="src: #waterTwo; shader: flat; side: double;"></a-plane>

  <!-- TOP WATER OVERLAY -->

  <a-plane position="-148 -35 70" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.45;"></a-plane>
  <a-plane position="-74 -35 70" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.45;"></a-plane>
  <a-plane position="0 -35 70" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.45;"></a-plane>
  <a-plane position="74 -35 70" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.45;"></a-plane>
  <a-plane position="148 -35 70" rotation="-90 0 0" width="77" height="77" material="src: #waterOne; shader: flat; side: double; transparent: true; opacity: 0.45;"></a-plane>

</a-scene>

</body>
</html>
