<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>We Are Ghosts 8th Wall</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <!-- 8th Wall Engine -->
  <script
    src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js"
    async
    crossorigin="anonymous"
    data-preload-chunks="slam">
  </script>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

</head>

<body style="margin: 0; overflow: hidden;">

  <a-scene
    xrweb
    xrextras-runtime-error
    xrextras-loading
    renderer="colorManagement: true;"
  >

    <!-- ASSETS -->

    <a-assets>

      <img
        id="waterOne"
        src="assets/images/water-1.jpg"
      >

    </a-assets>

    <!-- CAMERA -->

    <a-camera position="0 1.6 0"></a-camera>

    <!-- TEST CUBE -->

    <a-box
      position="0 0 -3"
      scale="0.6 0.6 0.6"
      material="color: red;">
    </a-box>

    <!-- WATER PLANE -->
<a-plane
  position="0 1.6 -3"
  rotation="-90 0 0"
  width="70"
  height="70"
  material="
    src: url(assets/images/water-1.jpg);
    shader: flat;
    side: double;
  ">
</a-plane>


  </a-scene>

</body>

</html>
